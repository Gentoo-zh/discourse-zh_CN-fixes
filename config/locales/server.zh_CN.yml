    post_voting_undo_vote_action_window: 允许用户在“帖子投票”话题中撤销投票的分钟数（0 为不限制）
    remove_full_quote: 如果引用出现在帖子的开头、是整个帖子的引用、并且来自相邻帖子的引用，则自动删除引用。有关详细信息，请参阅<a href="https://meta.discourse.org/t/removal-of-full-quotes-from-direct-replies/106857" target="_blank">从直接回复中移除完整引用</a>
